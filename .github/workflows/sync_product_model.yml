name: Sync Product Model to HF Hub

on:
  push:
    branches: [miniembed-product]
  workflow_dispatch:

jobs:
  sync-to-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Push to Hugging Face Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os

          # Initialize API
          api = HfApi(token=os.environ['HF_TOKEN'])
          
          # TARGET MODEL REPO: surazbhandari/miniembed-product
          repo_id = 'surazbhandari/miniembed-product'
          
          print(f'Syncing miniembed-product branch to Model Repo: {repo_id}...')
          
          # Upload the current directory to the HF Model Repo.
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type='model',  # Setting explicitly to 'model'
              commit_message='Sync from GitHub Actions',
              ignore_patterns=['.github*', '.git*', '.DS_Store']
          )
          "
